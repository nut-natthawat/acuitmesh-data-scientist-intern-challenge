version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.4
    container_name: chicago-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mysecretpassword
      - POSTGRES_DB=chicago_db
    ports:
      - "5433:5432"
    volumes:
      - chicago_db_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  chicago_db_data: